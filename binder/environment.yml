# Binder environment — bibliometrics + case figure reproduction.
name: clamps-gallery-binder
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy
  - scipy
  - matplotlib
  - pandas
  - pyyaml
  - netcdf4
  - curl
  - pip
  - pip:
      - requests>=2.31.0
      - ipywidgets>=8.0.0
      - ipykernel>=6.0.0
