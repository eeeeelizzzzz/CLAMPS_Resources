description: >-
  Campaign → anchor DOI → author group for Channel E (anchor-paper author
  extraction). Floor year = earliest deployment start year − 2 per campaign.
global_floor_year: 2012
usage: >-
  Fetch anchor work authorships; expand coauthor groups for Channel D seeds.
  Do NOT citation-snowball from Wagner/Bell — use anchor papers only.

campaigns:
  PECAN:
    floor_year: 2013
    deployment_years: [2015]
    platforms: [CLAMPS1]
    anchor_dois:
      - doi: 10.1175/bams-d-15-00257.1
        label: Geerts et al. 2017 PECAN overview
        primary: true
    author_group_hint: [Bart Geerts, Michael C. Coniglio, Petra M. Klein, James O. Pinto, David D. Turner, Xuguang Wang]

