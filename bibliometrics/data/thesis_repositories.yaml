# Institutional repository targets for Tier 6 thesis/dissertation discovery.
#
# platform:
#   dspace_rest     — DSpace 7 REST discover API (/server/api/discover/search/objects)
#   dspace_rest6    — DSpace 6 REST discover (/rest/discover/search/objects)
#   digital_commons — Bepress / Digital Commons HTML search (/do/search/)
#   eprints         — EPrints advanced search (/cgi/search/advanced)
#
# institution_names: links to entries in data/thesis_institutions.yaml (matched by name)
# Channel H skips institutions listed in data/channel_h_exclusions.yaml (still searched via Channel F).
#
# crawled: true|false — set true after a full Channel H search of this repo.
#   discover_thesis_repos.py --skip-crawled omits repos where crawled: true.
# crawl_error: optional string when crawled: true but all queries failed (blocked, DNS, etc.).
#   discover_thesis_repos.py --skip-crawl-errors omits repos where crawl_error is set.

discovery:
  request_delay: 2.0
  from_year: 2015
  max_results_per_query: 30
  # Two-mode post-filter (see build_repo_queries in thesis_config.py):
  #   facility + campaign_compound queries → require CLAMPS signal in title/abstract
  #   campaign_only queries (bare PECAN, etc.) → no CLAMPS required; tagged campaign_candidate
  require_clamps_signal: true

search_phrases:
  - CLAMPS-1
  - CLAMPS-2
  - CLAMPS1
  - CLAMPS2
  - Collaborative Lower Atmospheric Mobile Profiling System
  - NSSL mobile profiling
  - NSSL mobile profiler

campaign_phrases:
  - PECAN
  - LAPSE-RATE
  - VORTEX-SE
  - TORUS
  - PERiLS
  - Perdigão
  - CHEESEHEAD
  - AWAKEN

aggregators:
  oatd:
    enabled: true
    base_url: https://www.oatd.org
    max_pages: 3

repositories:
  # --- Priority 1: CLAMPS home + known CLAMPS thesis hits ---
  - id: shareok
    name: SHAREOK
    platform: dspace_rest
    base_url: https://shareok.org
    institution_names:
      - University of Oklahoma
      - University of Central Oklahoma
      - Oklahoma State University
    priority: 1
    notes: OU + UCO + OSU theses; DSpace 7
    crawled: true
  - id: upcommons
    name: UPCommons (UPC Barcelona)
    platform: dspace_rest
    base_url: https://upcommons.upc.edu
    institution_names:
      - Universitat Politècnica de Catalunya
    priority: 1
    notes: Known CLAMPS dissertation in corpus
    crawled: true
  # --- Priority 2: Texas Digital Library DSpace instances ---
